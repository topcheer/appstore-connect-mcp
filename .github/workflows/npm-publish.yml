# ─────────────────────────────────────────────────────────────────
# npm-publish — Auto-publish to npm via GitHub OIDC (Trusted Publishing)
#
# Uses npm provenance with GitHub Actions OIDC — no NPM_TOKEN needed.
# The package is linked to the GitHub repo in npm's trusted publishing settings.
#
# Triggers:
#   - GitHub Release published → auto-publish
#   - Manual dispatch (Actions tab → Run workflow)
# ─────────────────────────────────────────────────────────────────
name: Publish to npm

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      version:
        description: 'Override version (e.g. 1.2.3 or patch/minor/major)'
        required: false
        default: ''

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for OIDC + provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            npm version ${{ github.event.inputs.version }} --no-git-tag-version
          fi
          echo "version=$(node -p 'require("./package.json").version')" >> $GITHUB_OUTPUT

      - name: Build
        run: npm run build

      - name: Verify tools.json
        run: |
          test -f dist/tools.json
          echo "Tools: $(node -p 'require("./dist/tools.json").stats.total')"

      - name: Publish to npm (OIDC Trusted Publishing)
        run: npm publish --provenance --access public

      - name: Summary
        run: |
          echo "### Published @ggaiteam/appstore-connect-mcp@${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "https://www.npmjs.com/package/@ggaiteam/appstore-connect-mcp" >> $GITHUB_STEP_SUMMARY
