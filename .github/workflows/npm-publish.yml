# ─────────────────────────────────────────────────────────────────
# npm-publish — Push a tag `v1.2.3` to publish to npm
#
# Usage:
#   git tag v1.0.2
#   git push origin v1.0.2
#
# Version is extracted from the tag. GitHub Release is auto-created.
# Uses OIDC trusted publishing — no token needed.
# ─────────────────────────────────────────────────────────────────
name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Sync version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "Tag: $TAG  Version: $VERSION"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build
        run: npm run build

      - name: Verify tools.json
        run: |
          test -f dist/tools.json
          echo "Tools: $(node -p 'require("./dist/tools.json").stats.total')"

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ### npm
            ```
            npm install -g @ggaiteam/appstore-connect-mcp@${{ steps.version.outputs.version }}
            ```
