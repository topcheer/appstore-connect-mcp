# ─────────────────────────────────────────────────────────────────
# npm-publish — Auto-publish to npm on GitHub Release
#
# This workflow triggers when a new GitHub Release is published.
# It builds the package and publishes to npm using NPM_TOKEN.
#
# Setup:
#   1. Create an npm access token (automation type):
#      https://www.npmjs.com/settings/~/tokens
#   2. Add it as a repository secret named NPM_TOKEN:
#      Settings → Secrets and variables → Actions → New secret
# ─────────────────────────────────────────────────────────────────
name: Publish to npm

on:
  release:
    types: [published]

  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version (e.g. 1.2.3 or patch/minor/major)'
        required: false
        default: ''

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # for npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            npm version ${{ github.event.inputs.version }} --no-git-tag-version
          fi
          echo "version=$(node -p 'require("./package.json").version')" >> $GITHUB_OUTPUT

      - name: Build
        run: npm run build

      - name: Verify tools.json
        run: |
          test -f dist/tools.json
          echo "Tools: $(node -p 'require("./dist/tools.json").stats.total')"

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          echo "### Published appstore-connect-mcp@${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "https://www.npmjs.com/package/appstore-connect-mcp" >> $GITHUB_STEP_SUMMARY
